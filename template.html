<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    font-family: 'Montserrat', Arial, sans-serif;
  }

  .canvas {
    position: relative;
    width: 1080px;
    height: 1350px;
    background: #111;
  }

  /* ---------- Background image, full bleed ---------- */
  .bg {
    position: absolute;
    top: 0; left: 0;
    width: 1080px;
    height: 1350px;
    object-fit: cover;
  }

  /* ---------- Logo, top-left, with soft white glow ---------- */
  .logo-wrap {
    position: absolute;
    top: 40px;
    left: 40px;
    width: 220px;
    height: 220px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .logo-glow {
    position: absolute;
    width: 220px;
    height: 220px;
    background: radial-gradient(circle, rgba(255,255,255,0.55) 0%, rgba(255,255,255,0.0) 70%);
    border-radius: 50%;
  }
  .logo-img {
    position: relative;
    width: 180px;
    height: auto;
    z-index: 2;
  }

  /* ---------- Dark gradient overlay, bottom 40% ---------- */
  .overlay {
    position: absolute;
    left: 0;
    bottom: 0;
    width: 1080px;
    height: 540px; /* 40% of 1350 */
    background: linear-gradient(to top, rgba(0,0,0,0.90) 0%, rgba(0,0,0,0.90) 40%, rgba(0,0,0,0) 100%);
    z-index: 3;
  }

  /* ---------- Text block with L-shaped bracket ---------- */
  .text-block {
    position: absolute;
    left: 60px;
    right: 60px;
    bottom: 130px;
    padding: 10px 0 10px 36px;
    border-left: 3px solid #ffffff;
    border-bottom: 3px solid #ffffff;
    z-index: 4;
  }

  .headline {
    color: #ffffff;
    font-weight: 800;
    font-size: 54px;
    line-height: 1.22;
    text-align: center;
    text-transform: none;
  }

  .headline .hl {
    background-color: #FF6B00;
    color: #ffffff;
    font-weight: 900;
    padding: 2px 10px;
    border-radius: 3px;
    display: inline;
    box-decoration-break: clone;
    -webkit-box-decoration-break: clone;
  }

  /* ---------- Social icon strip ---------- */
  .icon-strip {
    position: absolute;
    bottom: 34px;
    left: 0;
    width: 1080px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 46px;
    z-index: 4;
  }
  .icon-strip svg {
    width: 30px;
    height: 30px;
    fill: #ffffff;
    opacity: 0.95;
  }
</style>
</head>
<body>
  <div class="canvas">
    <img class="bg" src="{{BACKGROUND_URL}}" />

    <div class="overlay"></div>

    <div class="logo-wrap">
      <div class="logo-glow"></div>
      <img class="logo-img" src="{{LOGO_URL}}" />
    </div>

    <div class="text-block">
      <div class="headline">{{HEADLINE_HTML}}</div>
    </div>

    <div class="icon-strip">
      <!-- Facebook -->
      <svg viewBox="0 0 24 24"><path d="M22 12a10 10 0 1 0-11.6 9.9v-7H7.9V12h2.5V9.8c0-2.5 1.5-3.9 3.8-3.9 1.1 0 2.2.2 2.2.2v2.5h-1.3c-1.2 0-1.6.8-1.6 1.6V12h2.8l-.4 2.9h-2.4v7A10 10 0 0 0 22 12"/></svg>
      <!-- Instagram -->
      <svg viewBox="0 0 24 24"><path d="M7 2h10a5 5 0 0 1 5 5v10a5 5 0 0 1-5 5H7a5 5 0 0 1-5-5V7a5 5 0 0 1 5-5m-.2 2A2.8 2.8 0 0 0 4 6.8v10.4A2.8 2.8 0 0 0 6.8 20h10.4a2.8 2.8 0 0 0 2.8-2.8V6.8A2.8 2.8 0 0 0 17.2 4zm5.2 3a5 5 0 1 1 0 10 5 5 0 0 1 0-10m0 2a3 3 0 1 0 0 6 3 3 0 0 0 0-6m5.3-3.3a1.2 1.2 0 1 1 0 2.4 1.2 1.2 0 0 1 0-2.4"/></svg>
      <!-- X -->
      <svg viewBox="0 0 24 24"><path d="M18.9 2h3.3l-7.2 8.3L23 22h-6.8l-5.3-6.9L4.6 22H1.3l7.7-8.8L1 2h6.9l4.8 6.3z"/></svg>
      <!-- LinkedIn -->
      <svg viewBox="0 0 24 24"><path d="M4.98 3.5a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5M3 9h4v12H3zM10 9h3.8v1.7h.05c.53-1 1.83-2 3.77-2 4.03 0 4.78 2.65 4.78 6.1V21h-4v-5.4c0-1.3-.02-3-1.83-3-1.83 0-2.1 1.43-2.1 2.9V21h-4z"/></svg>
      <!-- WhatsApp -->
      <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 0 0-8.6 15.1L2 22l5-1.3A10 10 0 1 0 12 2m0 2a8 8 0 0 1 6.9 12.1l-.3.5.6 2.3-2.4-.6-.5.3A8 8 0 1 1 12 4m-3 4.2c-.2 0-.5 0-.7.3-.3.3-1 1-1 2.3s.9 2.7 1 2.9c.2.2 1.7 2.7 4.3 3.7 2.1.8 2.5.6 3 .6.4-.1 1.3-.5 1.5-1s.2-.9.1-1c-.1-.2-.2-.2-.4-.3l-1.6-.8c-.2-.1-.4-.1-.5.1l-.6.9c-.1.1-.3.2-.5.1-.4-.1-1.4-.5-2.3-1.4-.7-.7-1.2-1.5-1.4-1.9-.1-.2 0-.4.1-.5l.6-.7c.1-.2.1-.4 0-.5l-.7-1.7c-.1-.2-.3-.3-.5-.3z"/></svg>
    </div>
  </div>
</body>
</html>
